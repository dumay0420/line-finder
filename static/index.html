<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>LINE@ 客戶探測器</title>
<script src="https://cdn.tailwindcss.com"></script>
<style>
  :root { --line-green: #06C755; }
  body  { background: #0f172a; font-family: 'Segoe UI', system-ui, sans-serif; }
  .card { background: #1e293b; border: 1px solid #334155; border-radius: 12px; }
  .btn-green {
    background: var(--line-green); color: #fff; font-weight: 600;
    padding: 10px 24px; border-radius: 8px; cursor: pointer; transition: opacity .2s;
    width: 100%; margin-top: 12px;
  }
  .btn-green:hover { opacity: .85; }
  .btn-green:disabled { opacity: .4; cursor: not-allowed; }
  .btn-dl {
    background: #3b82f6; color: #fff; font-weight: 600;
    padding: 9px 20px; border-radius: 8px; cursor: pointer; transition: opacity .2s;
  }
  .btn-dl:hover { opacity: .85; }
  .log-box {
    background: #0f172a; border: 1px solid #334155; border-radius: 8px;
    height: 180px; overflow-y: auto; padding: 10px 12px;
    font-family: monospace; font-size: 12px; color: #94a3b8;
  }
  .log-box p { margin: 1px 0; line-height: 1.5; }
  table { border-collapse: collapse; width: 100%; }
  th { background: #1B4F72; color: #fff; padding: 8px 12px; text-align: left; font-size: 13px; position: sticky; top: 0; }
  td { padding: 7px 12px; font-size: 13px; border-bottom: 1px solid #334155; color: #cbd5e1; }
  tr:hover td { background: #1e3a5f22; }
  .tag { display: inline-block; padding: 2px 8px; border-radius: 99px; font-size: 11px; font-weight: 600; }
  .county-苗栗縣 { background:#f0f4c3; color:#5d4037; }
  .county-台中市 { background:#fef9e7; color:#7b4f00; }
  .county-彰化縣 { background:#e8f5e9; color:#2e7d32; }
  .county-南投縣 { background:#fbe9e7; color:#bf360c; }
  .county-雲林縣 { background:#e3f2fd; color:#0d47a1; }
  .county-嘉義縣 { background:#fce4ec; color:#880e4f; }
  .county-嘉義市 { background:#f3e5f5; color:#4a148c; }
  .county-台南市 { background:#fff3e0; color:#e65100; }
  input[type=text], textarea {
    background:#0f172a; border:1px solid #475569; border-radius:6px;
    color:#e2e8f0; padding:8px 10px; width:100%; font-size:13px;
  }
  input[type=text]:focus, textarea:focus { outline:none; border-color:#06C755; }
  label { color:#94a3b8; font-size:13px; margin-bottom:4px; display:block; }
  .checkbox-item { display:flex; align-items:center; gap:8px; color:#cbd5e1; font-size:13px; cursor:pointer; }
  .checkbox-item input { accent-color: var(--line-green); width:15px; height:15px; cursor:pointer; }
  #progress-bar-wrap { background:#334155; border-radius:99px; height:6px; overflow:hidden; }
  #progress-bar { background:var(--line-green); height:100%; width:0%; transition:width .3s; border-radius:99px; }
</style>
</head>
<body class="min-h-screen p-6">

<!-- Header -->
<div class="mb-6 flex items-center gap-3">
  <div style="background:var(--line-green);width:36px;height:36px;border-radius:8px;display:flex;align-items:center;justify-content:center;font-size:20px;">💬</div>
  <div>
    <h1 class="text-white font-bold text-xl">LINE@ 客戶探測器</h1>
    <p class="text-slate-400 text-xs">自動搜尋各行業 LINE 官方帳號，輸出 Excel</p>
  </div>
</div>

<div class="flex gap-5" style="align-items:flex-start">

  <!-- Left Panel: Form -->
  <div class="card p-5" style="width:280px;flex-shrink:0">
    <h2 class="text-white font-semibold mb-4 text-sm">搜尋設定</h2>

    <div class="mb-4">
      <label>行業關鍵字</label>
      <input type="text" id="industry" placeholder="例：診所、健身房、咖啡廳" value="診所">
    </div>

    <div class="mb-4">
      <label>目標縣市</label>
      <div class="flex flex-col gap-2 mt-1">
        <label class="checkbox-item"><input type="checkbox" value="苗栗縣"> 苗栗縣</label>
        <label class="checkbox-item"><input type="checkbox" value="台中市" checked> 台中市</label>
        <label class="checkbox-item"><input type="checkbox" value="彰化縣"> 彰化縣</label>
        <label class="checkbox-item"><input type="checkbox" value="南投縣"> 南投縣</label>
        <label class="checkbox-item"><input type="checkbox" value="雲林縣"> 雲林縣</label>
        <label class="checkbox-item"><input type="checkbox" value="嘉義縣"> 嘉義縣</label>
        <label class="checkbox-item"><input type="checkbox" value="嘉義市"> 嘉義市</label>
        <label class="checkbox-item"><input type="checkbox" value="台南市" checked> 台南市</label>
      </div>
    </div>

    <div class="mb-4">
      <label>排除關鍵字（逗號分隔）</label>
      <textarea id="excludes" rows="2" placeholder="中醫,牙醫,醫美,整形,藥局">中醫,牙醫,醫美,整形,藥局</textarea>
    </div>

    <button class="btn-green" id="btn-start" onclick="startSearch()">🔍 開始搜尋</button>
    <button class="btn-dl mt-2 w-full hidden" id="btn-dl" onclick="downloadExcel()">⬇ 下載 Excel</button>

    <!-- Stats -->
    <div class="mt-4 pt-4 border-t border-slate-700">
      <div class="flex justify-between text-xs text-slate-400">
        <span>已找到</span>
        <span id="found-count" class="text-green-400 font-bold">0</span>
      </div>
      <div id="progress-bar-wrap" class="mt-2">
        <div id="progress-bar"></div>
      </div>
    </div>
  </div>

  <!-- Right Panel: Results -->
  <div class="flex-1 flex flex-col gap-4">

    <!-- Log -->
    <div class="card p-4">
      <div class="flex justify-between items-center mb-2">
        <h2 class="text-white font-semibold text-sm">搜尋進度</h2>
        <span id="status-badge" class="tag" style="background:#334155;color:#94a3b8">等待中</span>
      </div>
      <div class="log-box" id="log"></div>
    </div>

    <!-- Results Table -->
    <div class="card p-4">
      <div class="flex justify-between items-center mb-3">
        <h2 class="text-white font-semibold text-sm">搜尋結果 <span id="result-count" class="text-slate-400 font-normal">(0 筆)</span></h2>
      </div>
      <div style="overflow-x:auto;max-height:420px;overflow-y:auto;border-radius:8px;border:1px solid #334155">
        <table>
          <thead>
            <tr>
              <th>#</th>
              <th>縣市</th>
              <th>商家名稱</th>
              <th>地址</th>
              <th>電話</th>
              <th>LINE@ ID</th>
              <th>連結</th>
            </tr>
          </thead>
          <tbody id="result-table"></tbody>
        </table>
      </div>
    </div>

  </div>
</div>

<script>
let ws = null;
let downloadUrl = null;
let rowCount = 0;

function log(msg, color) {
  const box = document.getElementById('log');
  const p = document.createElement('p');
  p.style.color = color || '#94a3b8';
  p.textContent = msg;
  box.appendChild(p);
  box.scrollTop = box.scrollHeight;
}

function setStatus(text, color) {
  const b = document.getElementById('status-badge');
  b.textContent = text;
  b.style.background = color + '22';
  b.style.color = color;
}

function addRow(data) {
  rowCount++;
  const tbody = document.getElementById('result-table');
  const tr = document.createElement('tr');
  const county = data.county || '';
  const lineUrl = data.line_url || '';
  const lineId = data.line_id || '';

  tr.innerHTML = `
    <td class="text-center text-slate-500">${rowCount}</td>
    <td><span class="tag county-${county}">${county}</span></td>
    <td class="font-medium text-white">${escHtml(data.name || '')}</td>
    <td>${escHtml(data.address || '')}</td>
    <td>${escHtml(data.phone || '')}</td>
    <td><code style="color:#06C755;font-size:12px">${escHtml(lineId)}</code></td>
    <td>
      ${lineUrl ? `<a href="${lineUrl}" target="_blank" style="color:#60a5fa;font-size:12px;text-decoration:underline">開啟</a>` : ''}
    </td>
  `;
  tbody.appendChild(tr);
  document.getElementById('result-count').textContent = `(${rowCount} 筆)`;
}

function escHtml(str) {
  return str.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
}

async function startSearch() {
  const industry = document.getElementById('industry').value.trim();
  const counties = [...document.querySelectorAll('input[type=checkbox]:checked')].map(c => c.value);
  const excludesRaw = document.getElementById('excludes').value;
  const excludes = excludesRaw.split(/[,，]/).map(s => s.trim()).filter(Boolean);

  if (!industry) { alert('請輸入行業關鍵字'); return; }
  if (!counties.length) { alert('請至少勾選一個縣市'); return; }

  // Reset UI
  rowCount = 0;
  downloadUrl = null;
  document.getElementById('result-table').innerHTML = '';
  document.getElementById('result-count').textContent = '(0 筆)';
  document.getElementById('found-count').textContent = '0';
  document.getElementById('progress-bar').style.width = '0%';
  document.getElementById('log').innerHTML = '';
  document.getElementById('btn-dl').classList.add('hidden');
  document.getElementById('btn-start').disabled = true;
  setStatus('搜尋中', '#06C755');

  // Create job
  const res = await fetch('/api/search', {
    method: 'POST',
    headers: {'Content-Type': 'application/json'},
    body: JSON.stringify({ industry, counties, excludes }),
  });
  const { job_id } = await res.json();

  log(`🚀 任務建立：${job_id}`);

  // Connect WebSocket
  const proto = location.protocol === 'https:' ? 'wss' : 'ws';
  ws = new WebSocket(`${proto}://${location.host}/ws/${job_id}`);

  ws.onmessage = (e) => {
    const evt = JSON.parse(e.data);

    if (evt.type === 'status') {
      log(evt.message);
    } else if (evt.type === 'found') {
      addRow(evt.data);
      document.getElementById('found-count').textContent = evt.total;
      document.getElementById('progress-bar').style.width = Math.min(evt.total * 2, 95) + '%';
      log(`✅ 找到：${evt.data.name} (${evt.data.county})`, '#06C755');
    } else if (evt.type === 'download_ready') {
      downloadUrl = evt.url;
      document.getElementById('btn-dl').classList.remove('hidden');
      document.getElementById('progress-bar').style.width = '100%';
    } else if (evt.type === 'complete') {
      setStatus('完成', '#06C755');
      document.getElementById('btn-start').disabled = false;
      log(`\n🎉 搜尋完成！共找到 ${evt.total} 筆`, '#06C755');
      if (!evt.total) {
        log('提示：Google 可能限制了搜尋速率，稍後再試或縮小搜尋範圍。', '#f59e0b');
      }
    } else if (evt.type === 'error') {
      log(`❌ 錯誤：${evt.message}`, '#ef4444');
      setStatus('錯誤', '#ef4444');
      document.getElementById('btn-start').disabled = false;
    }
  };

  ws.onclose = () => {
    if (document.getElementById('status-badge').textContent === '搜尋中') {
      setStatus('已斷線', '#f59e0b');
      document.getElementById('btn-start').disabled = false;
    }
  };
}

function downloadExcel() {
  if (downloadUrl) window.location.href = downloadUrl;
}
</script>
</body>
</html>
